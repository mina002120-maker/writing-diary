<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한 문장 일기장</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Gowun Dodum', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.12.16/dist/framer-motion.js"></script>
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #fb923c;
            border-radius: 10px;
        }

        body {
            font-family: 'Gowun Dodum', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            margin: 0;
            background: #F0F7FF;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }

            100% {
                opacity: 1;
            }
        }

        .animate-pulse {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const { motion, AnimatePresence } = Motion;

        // 아이콘 컴포넌트
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" x2="12" y1="15" y2="3" /></svg>;
        const IconRotateCcw = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /></svg>;
        const IconMessageSquare = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" /></svg>;
        const IconMic = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2" /><line x1="12" x2="12" y1="19" y2="22" /></svg>;
        const IconCloudUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242" /><path d="M12 12v9" /><path d="m16 16-4-4-4 4" /></svg>;
        const IconCheckCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg>;
        const IconVolume2 = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" /></svg>;
        const IconUserCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><circle cx="12" cy="10" r="3" /><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662" /></svg>;
        const IconChevronDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9" /></svg>;
        const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></svg>;

        const PencilFairy = ({ className = "", speech = "", mini = false, side = false, isListening = false }) => (
            <motion.div
                className={`relative flex flex-col items-center ${className} ${side ? 'justify-start' : ''}`}
                animate={{
                    y: isListening ? [0, -8, 0] : [0, -4, 0],
                    scale: isListening ? [1, 1.05, 1] : 1
                }}
                transition={{ repeat: Infinity, duration: isListening ? 0.6 : 2.5, ease: "easeInOut" }}
            >
                <svg width={mini ? "60" : "80"} height={mini ? "70" : "100"} viewBox="0 0 120 150" fill="none">
                    <motion.path d="M45 55C25 45 15 75 30 85C15 95 20 115 40 105" stroke={isListening ? "#EF4444" : "#A0AEC0"} strokeWidth="4" strokeLinecap="round" animate={{ rotate: isListening ? [-8, 8, -8] : 0 }} />
                    <motion.path d="M75 55C95 45 105 75 90 85C105 95 100 115 80 105" stroke={isListening ? "#EF4444" : "#A0AEC0"} strokeWidth="4" strokeLinecap="round" animate={{ rotate: isListening ? [8, -8, 8] : 0 }} />
                    <path d="M45 30L75 30V110L60 135L45 110V30Z" fill={isListening ? "#F87171" : "#F6AD55"} stroke="#4A5568" strokeWidth="2" />
                    <path d="M45 110L60 135L75 110H45Z" fill="#FBD38D" stroke="#4A5568" strokeWidth="2" />
                    <path d="M54 125L60 135L66 125H54Z" fill="#2D3748" />
                    <path d="M45 15C45 10 75 10 75 15V30H45V15Z" fill="#FBB6CE" stroke="#4A5568" strokeWidth="2" />
                    <circle cx="53" cy="65" r="2.5" fill={isListening ? "#EF4444" : "#2D3748"} />
                    <circle cx="67" cy="65" r="2.5" fill={isListening ? "#EF4444" : "#2D3748"} />
                    <motion.path d="M56 78C56 78 60 82 64 78" stroke="#2D3748" strokeWidth="2" strokeLinecap="round" animate={{ scaleY: isListening ? [1, 1.8, 1] : 1 }} />
                </svg>
                {speech && (
                    <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className={`mt-2 bg-white px-6 py-3 rounded-3xl shadow-xl border-2 ${isListening ? 'border-red-400 ring-4 ring-red-50' : 'border-orange-200'} relative z-10 whitespace-pre-wrap max-w-[280px]`}>
                        <p className={`text-lg font-bold leading-tight text-center ${isListening ? 'text-red-500' : 'text-slate-800'}`}>{isListening ? "듣고 있어요! 천천히 말씀하세요." : speech}</p>
                        <div className={`absolute -top-2 left-1/2 -translate-x-1/2 w-4 h-4 bg-white border-l-2 border-t-2 ${isListening ? 'border-red-400' : 'border-orange-200'} rotate-45`}></div>
                    </motion.div>
                )}
            </motion.div>
        );

        const App = () => {
            const [step, setStep] = useState(0);
            const [nickname, setNickname] = useState("");
            const [selectedId, setSelectedId] = useState("");
            const [studentList, setStudentList] = useState([]);
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const [diaryParts, setDiaryParts] = useState({ when: "", where: "", who: "", what: "" });
            const [subStep, setSubStep] = useState(0);
            const [additionalStory, setAdditionalStory] = useState("");
            const [selectedFeelings, setSelectedFeelings] = useState([]);
            const [showInstruction, setShowInstruction] = useState(false);
            const [progress, setProgress] = useState(0);
            const [isCapturing, setIsCapturing] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [saveStatus, setSaveStatus] = useState(null);
            const [isListening, setIsListening] = useState(false);
            const [interimText, setInterimText] = useState("");
            const [todayDate, setTodayDate] = useState("");
            const [micStatus, setMicStatus] = useState("checking"); // checking | idle | success | error_denied | error_secure | error
            const [feelingReason, setFeelingReason] = useState("");
            const [activeTooltip, setActiveTooltip] = useState(null);

            const recognitionRef = useRef(null);
            const diaryCardRef = useRef(null);

            // 설정 관리 (localStorage 활용)
            const [gasUrl, setGasUrl] = useState(localStorage.getItem('ONE_SENTENCE_DIARY_GAS_URL') || "https://script.google.com/macros/s/AKfycbwIrt5fhjbHwRAb6VDQMCr1wIQ30yNbSk3o3KgJKfrEOE8337IBio40EoxW7zmXgFJ7/exec");
            const [showSettingModal, setShowSettingModal] = useState(false);
            const [urlInput, setUrlInput] = useState("");

            // 로컬 테스트용 더미 명단
            const DUMMY_STUDENTS = [
                { id: 1, name: "강현우" }, { id: 2, name: "김민서" }, { id: 3, name: "박준영" }, { id: 4, name: "이서윤" }, { id: 5, name: "최도윤" }
            ];

            useEffect(() => {
                if (step === 3) {
                    setShowInstruction(true);
                }
            }, [step, subStep]);

            // Step 1에서 마이크가 이미 허용된 경우 자동으로 다음 단계 진행
            useEffect(() => {
                if (step === 1 && micStatus === 'success') {
                    const timer = setTimeout(() => handleNextStep(), 1200);
                    return () => clearTimeout(timer);
                }
            }, [step, micStatus]);

            useEffect(() => {
                // 오늘 날짜 설정 (YYYY년 MM월 DD일)
                const now = new Date();
                const formatted = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
                setTodayDate(formatted);

                const fetchStudents = async () => {
                    // 1. Google Apps Script 내부 실행 시
                    if (typeof google !== 'undefined' && google.script && google.script.run) {
                        google.script.run.withSuccessHandler(data => {
                            if (data && Array.isArray(data)) setStudentList(data);
                        }).getStudents();
                    }
                    // 2. 외부 호스팅인 경우 (저장된 gasUrl 사용)
                    else if (gasUrl && gasUrl.startsWith("https://")) {
                        try {
                            const response = await fetch(`${gasUrl}?type=getStudents`);
                            const data = await response.json();
                            if (data && Array.isArray(data)) setStudentList(data);
                        } catch (e) {
                            console.warn("GAS 연결 실패", e);
                            setStudentList(DUMMY_STUDENTS);
                        }
                    }
                    else {
                        setStudentList(DUMMY_STUDENTS);
                    }
                };
                fetchStudents();
            }, []);

            // 마이크 권한 상태를 앱 시작 시 자동으로 확인
            useEffect(() => {
                let permissionResult = null;
                const checkMicPermission = async () => {
                    // 1. file:// 프로토콜 체크
                    if (window.location.protocol === 'file:') {
                        setMicStatus('error_file');
                        return;
                    }

                    // 2. 보안 컨텍스트 체크 (Web Speech API 필수 조건)
                    if (!window.isSecureContext) {
                        setMicStatus('error_secure');
                        return;
                    }

                    // 3. 권한 상태 쿼리
                    if (navigator.permissions && navigator.permissions.query) {
                        try {
                            permissionResult = await navigator.permissions.query({ name: 'microphone' });

                            const applyState = (state) => {
                                if (state === 'granted') {
                                    setMicStatus('success');
                                } else {
                                    setMicStatus('idle');
                                }
                            };

                            applyState(permissionResult.state);

                            permissionResult.onchange = () => {
                                if (permissionResult.state === 'granted') setMicStatus('success');
                                else setMicStatus('idle');
                            };
                        } catch (e) {
                            // 권한 쿼리 자체가 차단된 경우 (iframe 정책 등)
                            setMicStatus('idle');
                        }
                    } else {
                        setMicStatus('idle');
                    }
                };
                checkMicPermission();
                return () => {
                    if (permissionResult) permissionResult.onchange = null;
                };
            }, []);

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition && !recognitionRef.current) {
                    const recognition = new SpeechRecognition();
                    recognition.lang = 'ko-KR';
                    recognition.interimResults = true;
                    recognition.continuous = true;

                    recognition.onstart = () => {
                        setIsListening(true);
                        setInterimText("");
                    };

                    recognition.onresult = (event) => {
                        let finalText = "";
                        let currentInterim = "";
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const transcript = event.results[i][0].transcript;
                            if (event.results[i].isFinal) {
                                finalText += transcript;
                            } else {
                                currentInterim += transcript;
                            }
                        }

                        if (finalText) {
                            handleFinalSpeech(finalText);
                        } else {
                            setInterimText(currentInterim);
                        }
                    };

                    recognition.onerror = (event) => {
                        if (event.error === 'no-speech') {
                            console.warn("음성이 감지되지 않았습니다.");
                        } else {
                            console.error("음성 인식 오류:", event.error);
                        }
                        setIsListening(false);
                    };

                    recognition.onend = () => {
                        setIsListening(false);
                    };

                    recognitionRef.current = recognition;
                }

                return () => {
                    if (recognitionRef.current) recognitionRef.current.stop();
                };
            }, []);


            const isFileProtocol = window.location.protocol === 'file:';

            const requestMicPermission = async () => {
                if (window.location.protocol === 'file:') { setMicStatus("error_file"); return; }
                if (window.location.protocol === 'http:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                    setMicStatus("error_secure");
                    return;
                }

                setMicStatus("checking");

                try {
                    // 1. getUserMedia를 통해 마이크 권한 직접 요청 (가장 확실한 방법)
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    // 권한 획득 성공 시 스트림은 바로 닫기 (음성 인식 API만 사용)
                    stream.getTracks().forEach(track => track.stop());

                    // 2. 음성 인식 객체 생성 및 테스트
                    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (!SR) { setMicStatus("error"); return; }

                    const testRec = new SR();
                    testRec.lang = 'ko-KR';

                    let resolved = false;
                    const done = (result) => {
                        if (resolved) return;
                        resolved = true;
                        try { testRec.abort(); } catch (e) { }
                        if (result === 'success') {
                            setMicStatus("success");
                            setTimeout(() => handleNextStep(), 800);
                        } else {
                            setMicStatus(result);
                        }
                    };

                    testRec.onstart = () => done('success');
                    testRec.onerror = (e) => {
                        console.log('mic test error:', e.error);
                        if (e.error === 'not-allowed') done('error_denied');
                        else done('success'); // 접근 권한은 확보된 상태
                    };
                    testRec.onend = () => done('success');

                    testRec.start();
                    setTimeout(() => done('success'), 3000); // 3초 내 반응 없어도 일단 권한은 딴 것으로 간주

                } catch (err) {
                    console.error('마이크 요청 에러:', err);
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        setMicStatus("error_denied");
                    } else if (err.name === 'SecurityError' || err.name === 'NotSupportedError') {
                        // GAS 등 특수 환경에서 권한 정책 충돌 가능성
                        if (window.location.protocol === 'https:') setMicStatus("error_policy");
                        else setMicStatus("error_secure");
                    } else {
                        setMicStatus("error");
                    }
                }
            };

            const handleFinalSpeech = (text) => {
                if (!text.trim()) return;
                const trimmedText = text.trim();

                // 음성 인식 결과가 들어올 때 각 단계별 처리
                if (step === 2) {
                    const found = studentList.find(s => trimmedText.includes(s.name));
                    if (found) {
                        setNickname(found.name);
                        setSelectedId(found.id);
                    }
                } else if (step === 3) {
                    // Step 3에서는 인식된 내용을 입력창에 넣고, 
                    // 만약 예시 단어와 정확히 일치하거나 포함하면 자동으로 선택되게 할 수도 있음
                    setInterimText(trimmedText);
                    const matchedOption = diaryOptions[subStep].options.find(opt => trimmedText.includes(opt));
                    if (matchedOption) {
                        handleSubStepComplete(matchedOption);
                        setInterimText("");
                    }
                } else if (step === 4) {
                    setAdditionalStory(prev => prev ? prev + " " + trimmedText : trimmedText);
                    setInterimText("");
                } else if (step === 6) {
                    setFeelingReason(prev => prev ? prev + " " + trimmedText : trimmedText);
                    setInterimText("");
                } else {
                    setInterimText(trimmedText);
                }
            };

            const toggleListening = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert("이 브라우저는 음성 인식을 지원하지 않습니다. Chrome 브라우저를 사용해 주세요!");
                    return;
                }

                if (!recognitionRef.current) {
                    const recognition = new SpeechRecognition();
                    recognition.lang = 'ko-KR';
                    recognition.interimResults = true;
                    recognition.continuous = true;
                    recognition.onstart = () => { setIsListening(true); setInterimText(""); };
                    recognition.onresult = (event) => {
                        let finalText = "";
                        let currentInterim = "";
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const transcript = event.results[i][0].transcript;
                            if (event.results[i].isFinal) finalText += transcript;
                            else currentInterim += transcript;
                        }
                        if (finalText) handleFinalSpeech(finalText);
                        else setInterimText(currentInterim);
                    };
                    recognition.onerror = (event) => {
                        if (event.error !== 'no-speech') console.error("음성 인식 오류:", event.error);
                        setIsListening(false);
                    };
                    recognition.onend = () => setIsListening(false);
                    recognitionRef.current = recognition;
                }

                if (isListening) {
                    recognitionRef.current.stop();
                } else {
                    setInterimText("");
                    try {
                        recognitionRef.current.start();
                    } catch (e) {
                        try {
                            recognitionRef.current.stop();
                            setTimeout(() => recognitionRef.current.start(), 250);
                        } catch (e2) { }
                    }
                }
            };

            const handleNextStep = (feelingOverride = null) => {
                if (isListening) recognitionRef.current.stop();
                const nextStep = step + 1;
                setStep(nextStep);
                setProgress(prev => Math.min(prev + (100 / 7), 100));

                // Step 6 (Reason) -> Step 7 (Card) 자동 제출
                if (nextStep === 7) {
                    saveToGoogleSheets(feelingOverride);
                }
            };

            const handlePrevStep = () => {
                if (isListening) recognitionRef.current.stop();
                if (step === 3 && subStep > 0) {
                    setSubStep(prev => prev - 1);
                    setProgress(prev => prev - 4);
                } else {
                    setStep(prev => Math.max(0, prev - 1));
                    setProgress(prev => Math.max(0, prev - (100 / 7)));
                }
            };

            const handleSubStepComplete = (value) => {
                if (!value) return;
                const key = diaryOptions[subStep].key;
                setDiaryParts(prev => ({ ...prev, [key]: value }));
                if (subStep < 3) {
                    setSubStep(subStep + 1);
                    setProgress(prev => prev + 4);
                } else {
                    handleNextStep();
                }
            };

            const saveToGoogleSheets = async (feelingOverride = null) => {
                setIsSaving(true);
                setSaveStatus(null);

                const combinedFeelings = selectedFeelings.map(f => f.label).join(", ");
                const combinedFeelingSentences = selectedFeelings.map(f => f.sentence).join(" ");
                const combinedDiary = `${diaryParts.when} ${diaryParts.where} ${diaryParts.who} ${diaryParts.what}. ${additionalStory} ${combinedFeelingSentences} ${feelingReason}`.trim();
                const payload = { id: selectedId, nickname, diaryText: combinedDiary, feeling: combinedFeelings };

                // 1. Google Apps Script 내부 실행 시
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler(() => { setSaveStatus('success'); setTimeout(() => setSaveStatus(null), 3000); setIsSaving(false); })
                        .withFailureHandler(() => { setSaveStatus('error'); setIsSaving(false); })
                        .saveDiary(payload);
                }
                // 2. 외부 호스팅인 경우 (gasUrl 사용)
                else if (gasUrl && gasUrl.startsWith("https://")) {
                    try {
                        await fetch(gasUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        setSaveStatus('success');
                        setTimeout(() => setSaveStatus(null), 3000);
                    } catch (e) { setSaveStatus('error'); }
                    finally { setIsSaving(false); }
                }
                else {
                    console.log("로컬 저장 시뮬레이션:", payload);
                    setTimeout(() => { setSaveStatus('success'); setIsSaving(false); }, 1000);
                }
            };

            const updateGasUrl = () => {
                const trimmed = urlInput.trim();
                if (trimmed.startsWith("https://script.google.com")) {

                                                {interimText && isListening && (
                                                    <div className="absolute inset-0 bg-white/90 backdrop-blur-sm p-6 rounded-[2rem] border-2 border-red-400 flex flex-col items-center justify-center gap-4 z-10 text-center">
                                                        <div className="text-red-500 text-2xl font-black animate-pulse">"{interimText}"</div>
                                                        <button
                                                            onClick={(e) => {
                                                                e.stopPropagation();
                                                                setFeelingReason(prev => prev ? prev + " " + interimText : interimText);
                                                                setInterimText("");
                                                            }}
                                                            className="px-6 py-3 bg-blue-500 text-white rounded-2xl font-black text-xl shadow-lg hover:bg-blue-600 active:scale-95 transition-all"
                                                        >
                                                            지금 바로 입력하기
                                                        </button>
                                                    </div>
                                                )}
                                                <button onClick={toggleListening} className={`absolute right-4 bottom-4 p-6 rounded-2xl shadow-xl transition-all hover:scale-105 active:scale-95 z-20 ${isListening ? 'bg-red-500 text-white animate-pulse' : 'bg-orange-500 text-white shadow-orange-200'}`}>
                                                    <div className="scale-[1.5]">{isListening ? <IconVolume2 /> : <IconMic />}</div>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 w-full max-w-2xl mx-auto shrink-0">
                                        <button onClick={handlePrevStep} className="px-10 py-5 bg-orange-50 text-orange-600 border-4 border-orange-100 rounded-[2rem] text-3xl font-black hover:bg-orange-100 transition-all shadow-md active:scale-95 active:shadow-none">이전으로</button>
                                        <button onClick={handleNextStep} className="flex-1 py-5 bg-orange-500 text-white rounded-[2rem] text-4xl font-black shadow-[0_8px_0_rgb(154,52,18)] active:translate-y-2 active:shadow-none transition-all">일기 완성하기</button>
                                    </div>
                                </motion.div>
                            )}

                            {step === 7 && (
                                <motion.div key="s7" initial={{ opacity: 0, scale: 0.98 }} animate={{ opacity: 1, scale: 1 }} className="w-full h-full flex flex-col space-y-4 overflow-hidden py-1 px-4">
                                    <div ref={diaryCardRef} className="flex-1 bg-white p-6 rounded-[2.5rem] shadow-xl border-[8px] border-orange-400 text-center flex flex-col justify-center items-center space-y-3 overflow-hidden relative">
                                        <div className="flex items-center gap-2 px-5 py-1 bg-orange-100/50 rounded-full border border-orange-200 shadow-sm">
                                            <div className="scale-75"><IconCalendar /></div>
                                            <span className="text-xl font-black text-orange-700">{todayDate}</span>
                                        </div>

                                        <div className="shrink-0 p-4 bg-orange-50 rounded-[2.5rem] border border-orange-100 shadow-inner flex -space-x-6">
                                            {selectedFeelings.map(f => (
                                                <span key={f.label} className="text-[6.5rem] drop-shadow-2xl leading-none">{f.icon}</span>
                                            ))}
                                        </div>
                                        <div className="space-y-4 w-full px-8">
                                            <h3 className="text-3xl font-black text-slate-800 tracking-tight leading-none"><span className="text-orange-500">{nickname}</span>의 일기</h3>
                                            <div className="p-5 bg-orange-50/50 rounded-[2.5rem] border-[3px] border-dashed border-orange-200 min-h-[5rem] max-h-40 overflow-y-auto custom-scrollbar flex items-center justify-center">
                                                <p className="text-2xl font-black text-slate-700 leading-tight break-keep">
                                                    {diaryParts.when} {diaryParts.where} {diaryParts.who} {diaryParts.what}. {additionalStory} {selectedFeelings.map(f => f.sentence).join(" ")} {feelingReason}
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="shrink-0 grid grid-cols-2 gap-3 pb-1">
                                        <button onClick={saveDiaryAsImage} disabled={isCapturing} className="flex items-center justify-center gap-2 py-3 bg-emerald-500 text-white rounded-[1.5rem] shadow-[0_6px_0_rgb(5,150,105)] font-black text-2xl hover:bg-emerald-600 hover:translate-y-1 hover:shadow-[0_4px_0_rgb(5,150,105)] transition-all active:translate-y-2 active:shadow-none">
                                            <IconDownload /> 이미지 저장
                                        </button>
                                        <div className={`flex items-center justify-center gap-2 py-3 text-white rounded-[1.5rem] shadow-[0_6px_0_rgb(29,78,216)] font-black text-2xl transition-all ${saveStatus === 'success' ? 'bg-blue-600' : 'bg-blue-700'}`}>
                                            {saveStatus === 'success' ? <div className="scale-90"><IconCheckCircle /></div> : <div className="scale-90"><IconCloudUpload /></div>}
                                            {isSaving ? "보내는 중..." : "제출 완료!"}
                                        </div>
                                        <button onClick={resetAll} className="col-span-2 flex items-center justify-center gap-2 py-1 text-slate-400 font-black text-lg hover:text-orange-500 transition-colors"><IconRotateCcw /> 다시 쓰기</button>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main >

                    {/* 단계별 설명 팝업 */}
                    < AnimatePresence >
                        {showInstruction && step === 3 && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm">
                                <motion.div initial={{ scale: 0.9, y: 20 }} animate={{ scale: 1, y: 0 }} exit={{ scale: 0.9, y: 20 }} className="bg-white rounded-[3rem] shadow-2xl max-w-xl w-full p-10 border-4 border-orange-300 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-4 bg-gradient-to-r from-orange-400 to-orange-500"></div>
                                    <div className="flex flex-col items-center text-center space-y-6">
                                        <div className="scale-[1.5] py-4"><PencilFairy /></div>
                                        <div className="space-y-4">
                                            <div className="inline-block py-2 px-6 bg-orange-100 text-orange-600 rounded-full font-black text-2xl shadow-sm border border-orange-200">
                                                {diaryOptions[subStep].label} (단계 {subStep + 1}/4)
                                            </div>
                                            <h2 className="text-3xl font-black text-slate-800 break-keep leading-relaxed">
                                                {diaryOptions[subStep].fairy}
                                            </h2>
                                            <p className="text-xl font-bold text-slate-500 break-keep bg-slate-50 p-6 rounded-[2rem] border-2 border-dashed border-slate-200 whitespace-pre-wrap">
                                                {diaryOptions[subStep].instruction}
                                            </p>
                                        </div>
                                        <button onClick={() => setShowInstruction(false)} className="w-full py-6 bg-orange-500 text-white rounded-[2rem] text-3xl font-black shadow-[0_8px_0_rgb(154,52,18)] hover:translate-y-1 hover:shadow-[0_6px_0_rgb(154,52,18)] transition-all active:translate-y-2 active:shadow-none">
                                            네, 알겠어요!
                                        </button>
                                    </div>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence >
                </div >
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>


</body>

</html>
