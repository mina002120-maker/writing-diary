const renderMix = (text, targetMark = null) => {
  if (!text) return "";
  const normalize = (c) => String(c).replace(/[\u201c\u201d]/g, '"').replace(/[\u2018\u2019]/g, "'");
  const targetNorm = targetMark ? normalize(targetMark) : '';
  const QUOTE_CHARS = /^[\u201c\u201d\u2018\u2019"'\uFF02\uFF07\u300C\u300D\u300E\u300F]$/;
  const parts = text.split(/([.,!?\u201c\u201d\u2018\u2019"'\uFF02\uFF07\u300C\u300D\u300E\u300F])/g);
  return parts.map((part, i) => {
    if (/^[.,!?\u201c\u201d\u2018\u2019"'\uFF02\uFF07\u300C\u300D\u300E\u300F]$/.test(part)) {
      const isTarget = targetMark && targetNorm.includes(normalize(part));
      // 따옴표는 인라인 스타일로 명조체를 강제 적용 (CSS 우선순위 충돌 완전 우회)
      const isQuote = QUOTE_CHARS.test(part);
      return e('span', {
        key: i,
        className: `punctuation-mark${isTarget ? ' target-highlight' : ''}${isQuote ? ' quote-serif' : ''}`,
        style: isQuote
          ? { fontFamily: "Georgia, 'Times New Roman', Batang, 'Noto Serif KR', serif", fontWeight: 'bold' }
          : undefined
      }, part);
    }
    return part;
  });
};

// 예시 문장을 문장 단위로 분리한다.
// 문장 종료 부호(. ! ? \u201c \u201d \u2018 \u2019)+공백 패턴에서 자른다.
// 예) "'…해야지.' 나는 …했다." → ["'…해야지.'", "나는 …했다."]
const splitIntoSentences = (text) => {
  if (!text) return [];
  const re = /[.!?\u201c\u201d\u2018\u2019]+\s+/g;
  const result = [];
  let lastEnd = 0;
  let m;
  while ((m = re.exec(text)) !== null) {
    result.push(text.slice(lastEnd, m.index + m[0].length).trim());
    lastEnd = m.index + m[0].length;
  }
  if (lastEnd < text.length) {
    const rest = text.slice(lastEnd).trim();
    if (rest) result.push(rest);
  }
  return result.length > 0 ? result : [text];
};

// 문장부호의 칸 내 위치 (4칸 기준 — 교과서 원고지 규칙)
// 여는 따옴표 → 오른쪽 위 | 닫는 따옴표 → 왼쪽 위 | 마침표·쉼표 → 왼쪽 아래
const getMarkPosition = (char) => {
  if (char === '.' || char === ',')
    return {
      buttonExtra: 'relative overflow-hidden',
      markStyle: { position: 'absolute', bottom: '5%', left: '12%' }
    };
  // 여는 따옴표 " ' → 오른쪽 위
  if (/[\u201c\u2018]/.test(char))
    return {
      buttonExtra: 'relative overflow-hidden',
      markStyle: { position: 'absolute', top: '8%', right: '10%' }
    };
  // 닫는 따옴표 " ' → 왼쪽 위
  if (/[\u201d\u2019]/.test(char))
    return {
      buttonExtra: 'relative overflow-hidden',
      markStyle: { position: 'absolute', top: '8%', left: '10%' }
    };
  return { buttonExtra: 'flex items-center justify-center', markStyle: {} };
};

// 쓰임 텍스트를 렌더링하면서 핵심키워드를 하이라이트한다.
// keyword 는 쉼표(,)로 구분된 여러 단어를 받을 수 있다.
const renderMeaning = (text, keyword) => {
  if (!text) return "";
  if (!keyword) return renderMix(text);
  const keywords = String(keyword).split(/[,，]/).map(k => k.trim()).filter(Boolean);
  if (keywords.length === 0) return renderMix(text);
  const escape = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const pattern = new RegExp('(' + keywords.map(escape).join('|') + ')', 'g');
  const parts = String(text).split(pattern);
  return parts.map((part, i) => {
    if (!part) return null;
    if (keywords.includes(part)) {
      return e('span', { key: 'kw-' + i, className: 'text-underline' }, renderMix(part));
    }
    return e(React.Fragment, { key: 'tx-' + i }, renderMix(part));
  });
};

// 시트의 예시 문장을 3단계 문제 형식으로 변환
const parseSentenceToProblem = (sentence, punctuationName) => {
  const meta = NAME_TO_META[punctuationName];
  if (!meta || !sentence) return null;

  // 일반 따옴표(" ')를 곡선 따옴표로 정규화
  let s = String(sentence);
  if (punctuationName === "큰따옴표") {
    let c = 0;
    s = s.replace(/"/g, () => (++c % 2 === 1 ? "\u201c" : "\u201d"));
  } else if (punctuationName === "작은따옴표") {
    let c = 0;
    s = s.replace(/'/g, () => (++c % 2 === 1 ? "\u2018" : "\u2019"));
  }

  let textParts, ans;
  if (meta.chars.length === 1) {
    const mark = meta.chars[0];
    const idx = s.lastIndexOf(mark);
    if (idx === -1) return null;
    textParts = [s.substring(0, idx), s.substring(idx + 1)];
    ans = [mark];
  } else {
    const [openMark, closeMark] = meta.chars;
    const openIdx = s.indexOf(openMark);
    const closeIdx = s.indexOf(closeMark, openIdx + 1);
    if (openIdx === -1 || closeIdx === -1) return null;
    textParts = [
      s.substring(0, openIdx),
      s.substring(openIdx + 1, closeIdx),
      s.substring(closeIdx + 1)
    ];
    ans = [openMark, closeMark];
  }

  // 정답 문자가 본문(textParts)에 남아 있으면 정답 노출이 되므로 사용하지 않음
  // (예: 한 문장에 따옴표 쌍이 여러 개, 또는 마침표가 여러 번 등장하는 경우)
  if (textParts.some(part => meta.chars.some(ch => part.includes(ch)))) return null;

  return {
    textParts: textParts,
    ans: ans,
    hint: `${punctuationName}(${ans.join(' ')})를 알맞게 사용해보세요.`
  };
};

// 쓰임 문장(예: "느낌을 나타내는 문장 끝에 쓴다.")을 명사구(예: "느낌을 나타내는 문장 끝에 쓰는 것")로 변환
const meaningToNounPhrase = (meaning) => {
  let s = String(meaning || '').replace(/[.\s]+$/, '');
  if (s.endsWith('쓴다'))     return s.slice(0, -2) + '쓰는 것';
  if (s.endsWith('써요'))     return s.slice(0, -2) + '쓰는 것';
  if (s.endsWith('사용한다')) return s.slice(0, -3) + '사용하는 것';
  if (s.endsWith('사용해요')) return s.slice(0, -3) + '사용하는 것';
  if (s.endsWith('나타낸다')) return s.slice(0, -3) + '나타내는 것';
  if (s.endsWith('나타내요')) return s.slice(0, -3) + '나타내는 것';
  return s;
};

                } else {
                  const selectedMarks = dedupeMarks(s2Answers.filter(a => a !== null));
                  if (selectedMarks.length === 0) return renderMix(currentProb.hint || '');
                  return e(React.Fragment, null,
                    selectedMarks.map((info, idx) => e(React.Fragment, { key: idx },
                      idx > 0 && "\n\n",
                      renderMix(`'${info.name}(${info.label})'는\n`),
                      renderMeaning(info.meaning, info.keyword)
                    )),
                    "\n\n다시 한번 생각해서 골라보세요!"
                  );
                }
              })()
            ),
            // ── 틀렸을 때: 정답 문장부호를 10칸 공책에 표시 ──
            !isCorrectS2 && currentProb && e('div', { className: 'mt-6 bg-blue-50 rounded-[20px] p-5 text-left' },
              e('p', { className: 'text-2xl font-bold text-blue-600 mb-3' }, '✏️ 정답을 공책에 바르게 써 보세요!'),
              (() => {
                const correctChars = [...new Set(currentProb.ans)];
                const cellSz = 52;
                return correctChars.map((ch, cIdx) => {
                  const mi = marks.find(m => m.label.includes(ch));
                  const nm = mi ? mi.name : ch;
                  const ps = getMarkPosition(ch);
                  const cc = mi ? mi.color.split(' ')[0] : 'text-[#2D346E]';
                  return e('div', { key: cIdx, className: 'mb-2' },
                    e('p', { className: 'text-xl font-bold text-slate-600 mb-1' }, '📌 ', e('span', { className: 'text-[#E85D04]' }, `${nm}(${ch})`)),
                    e('div', { style: { display: 'inline-flex', border: '2px solid #94a3b8', borderRadius: '6px', overflow: 'hidden' } },
                      Array.from({ length: 10 }, (_, i) =>
                        e('div', { key: i, style: { width: cellSz, height: cellSz, position: 'relative', borderRight: i < 9 ? '1px solid #b0b8c4' : 'none' } },
                          e('div', { style: { position: 'absolute', top: 0, bottom: 0, left: '50%', borderLeft: '1px dashed #cbd5e1' } }),
                          e('div', { style: { position: 'absolute', left: 0, right: 0, top: '50%', borderTop: '1px dashed #cbd5e1' } }),
                          i < 2 && e('span', { className: cc, style: { ...(ps ? ps.markStyle : {}), fontSize: '22px', fontWeight: 'bold' } }, renderMix(ch))
                        )
                      )
                    )
                  );
                });
              })()
            )
          ),
          e('button', {
            onClick: () => {
              setS2Feedback(false);
              if (!currentProb) return;
              const probKey = currentProb.textParts.join('|');
              const isProbSame = (p) => p.textParts.join('|') === probKey;

              if (isCorrectS2) {
                const isAlreadyMissed = s2Results.missed.some(isProbSame) || s2MissedPool.some(isProbSame);
                if (!isReviewMode) {
                  if (isAlreadyMissed) {
                    if (!s2Results.missed.find(isProbSame)) setS2Results(prev => ({ ...prev, missed: [...prev.missed, currentProb] }));
                  } else {
                    if (!s2Results.correct.find(isProbSame)) setS2Results(prev => ({ ...prev, correct: [...prev.correct, currentProb] }));
                  }
                }
                if (s2Idx < s2Quiz.length - 1) {
                  const nextProb = s2Quiz[s2Idx + 1];
                  setS2Idx(i => i + 1);
                  setS2Answers(new Array(nextProb.ans.length).fill(null));
                  setS2ActiveHole(0);
                } else {
                  if (!isReviewMode) { setTimeout(() => saveToSheet(s2MissedPool, s2Quiz), 100); }
                  setIsStep2Cleared(true);
                  setReportTarget('step2');
                  setHasReviewedMissed(isReviewMode);
                  setIsReviewMode(false);
                  setStage('results');
                }
              } else {
                if (!s2MissedPool.find(isProbSame)) setS2MissedPool(prev => [...prev, currentProb]);
                if (!isReviewMode && !s2Results.missed.find(isProbSame)) {
                  setS2Results(prev => ({ ...prev, missed: [...prev.missed, currentProb], correct: prev.correct.filter(p => !isProbSame(p)) }));
                }
                setS2Answers(new Array(currentProb.ans.length).fill(null));
                setS2ActiveHole(0);
              }
            },
            className: `w-full btn-cute py-8 text-4xl font-bold text-white shadow-lg ${isCorrectS2 ? 'btn-orange' : 'bg-blue-500'}`
          }, isCorrectS2 ? (s2Idx < s2Quiz.length - 1 ? "다음 문제" : "결과 확인하기") : "다시 생각하기")
        )
      )
    );
  }

  // ───────────── 10칸 공책 복습 화면 ─────────────
  const notebookModal = showNotebookPractice && (() => {
    const currentMissedLabels = reportTarget === 'step1' ? s1MissedLabels : s2MissedLabels;
    const rows = [];
    currentMissedLabels.forEach(label => {
      const markInfo = marks.find(m => m.label === label);
      const name = markInfo ? markInfo.name : label;
      const chars = [];
      for (const ch of label) { if (ch.trim()) chars.push(ch); }
      rows.push({ name, label: label.trim(), chars });
    });
    const cellSz = 72;
    const renderCell = (ch, idx) => {
      const pos = ch ? getMarkPosition(ch) : null;
      const mi = ch ? marks.find(m => m.label.includes(ch)) : null;
      const cc = mi ? mi.color.split(' ')[0] : 'text-[#2D346E]';
      return e('div', { key: idx, style: { width: cellSz, height: cellSz, position: 'relative', borderRight: '1px solid #94a3b8', flexShrink: 0 } },
        e('div', { style: { position: 'absolute', top: 0, bottom: 0, left: '50%', borderLeft: '1px dashed #cbd5e1' } }),
        e('div', { style: { position: 'absolute', left: 0, right: 0, top: '50%', borderTop: '1px dashed #cbd5e1' } }),
        ch && e('span', { className: cc, style: { ...(pos ? pos.markStyle : {}), fontSize: '28px', fontWeight: 'bold' } }, renderMix(ch))
      );
    };
    return e('div', { className: 'fixed inset-0 z-[800] flex items-center justify-center', style: { background: 'rgba(0,0,0,0.5)' } },
      e('div', { className: 'bg-white rounded-[40px] p-10 max-w-5xl w-full shadow-2xl' },
        e('h2', { className: 'text-5xl font-black text-[#E85D04] text-center mb-3' }, '✏️ 공책에 바르게 써 보세요!'),
        e('p', { className: 'text-2xl text-slate-500 text-center mb-8 whitespace-pre-wrap' },
          '아래 보기를 잘 보고, 공책에 따라 써 보세요.\n문장부호가 칸 안에서 어디에 위치하는지 확인하고 같은 자리에 써 보세요.'
        ),
        e('div', { className: 'space-y-6 mb-8' },
          rows.map((row, rIdx) => e('div', { key: rIdx },
            e('p', { className: 'text-2xl font-bold text-[#2D346E] mb-2 flex items-center gap-2' },
              '📌 ', e('span', { className: 'text-[#E85D04]' }, renderMix(`${row.name}(${row.label})`))
            ),
            e('div', { style: { display: 'inline-flex', border: '2px solid #64748b', borderRadius: '10px', overflow: 'hidden' } },
              Array.from({ length: 10 }, (_, cIdx) => {
                const exCount = Math.min(row.chars.length, 2);
                if (cIdx < exCount) return renderCell(row.chars[cIdx % row.chars.length], cIdx);
                if (row.chars.length > 1 && cIdx < row.chars.length) return renderCell(row.chars[cIdx], cIdx);
                return renderCell(null, cIdx);
              })
            )
          ))
        ),
        e('button', {
          onClick: () => { setShowNotebookPractice(false); setHasReviewedMissed(true); },
          className: 'w-full btn-cute btn-orange py-6 text-4xl font-bold border-none'
        }, '완료했어요! ✨')
      )
    );
  })();

  // ───────────── TUTORIALS ─────────────
  let tutorials = null;
  if (stage === 'step1' && !viewedTutorials.includes('step1')) {
    tutorials = e(TutorialPopup, { type: 'step1', onClose: () => setViewedTutorials([...viewedTutorials, 'step1']) });
  } else if (stage === 'step2' && !viewedTutorials.includes('step2')) {
    tutorials = e(TutorialPopup, { type: 'step2', onClose: () => setViewedTutorials([...viewedTutorials, 'step2']) });
  }

  return e('div', { className: 'h-full w-full relative' },
    view || e('div', { className: 'h-full flex items-center justify-center text-slate-400' }, '잠시만 기다려주세요...'),
    modal,
    tutorials,
    notebookModal
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
}; // window.onload
</script>
</body>
</html>
